name: npm set public

on:
  workflow_dispatch:

jobs:
  set-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Make @puralex/viber-connect* public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for p in viber-connect viber-connect-react viber-connect-web-component viber-connect-server; do
            echo "== @puralex/$p =="
            npm access set status=public "@puralex/$p" && echo "  set public" || echo "  FAILED"
          done
