name: npm debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Inspect npm auth target (token never printed)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "== token shape =="
          echo "NPM_TOKEN length: ${#NPM_TOKEN}"
          echo "NPM_TOKEN prefix: ${NPM_TOKEN:0:4}****   (npm_ = npmjs automation, ghp_/github_pat_ = GitHub PAT)"
          echo
          echo "== npm config =="
          echo "registry:          $(npm config get registry)"
          echo "@puralex:registry: $(npm config get @puralex:registry)"
          echo "userconfig path:   ${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo
          echo "== generated .npmrc (auth redacted) =="
          F="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          [ -f "$F" ] && sed -E 's/(_authToken=).*/\1REDACTED/' "$F" || echo "(no file at $F)"
          echo
          echo "== who does this token authenticate as on npmjs? =="
          npm whoami --registry=https://registry.npmjs.org/ || echo "whoami FAILED (token is not a valid npmjs token)"
          echo
          echo "== can this account see the org's packages? =="
          npm access list packages @puralex 2>&1 | head -20 || echo "no access / not an npmjs org"
          echo
          echo "== is 0.2.0 actually on npmjs? =="
          npm view @puralex/viber-connect versions --registry=https://registry.npmjs.org/ 2>&1 | head -5 || echo "not found on npmjs"
